<svg xmlns="http://www.w3.org/2000/svg" width="850" height="280" viewBox="0 0 850 280">
  <defs>
    <!-- Matrix code rain gradient -->
    <linearGradient id="rain-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="40%" stop-color="#00FF41" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0" />
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="cyan-glow" cx="75%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="green-glow" cx="25%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0" />
    </radialGradient>

    <!-- Shimmer border -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.6" />
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="8s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Typing cursor clip paths for roles -->
    <clipPath id="role1"><rect x="30" y="88" height="22" width="0"><animate attributeName="width" values="0;185;185;0;0" keyTimes="0;0.06;0.19;0.2;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="role2"><rect x="30" y="88" height="22" width="0"><animate attributeName="width" values="0;0;0;210;210;0;0" keyTimes="0;0.2;0.2;0.26;0.39;0.4;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="role3"><rect x="30" y="88" height="22" width="0"><animate attributeName="width" values="0;0;0;155;155;0;0" keyTimes="0;0.4;0.4;0.46;0.59;0.6;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="role4"><rect x="30" y="88" height="22" width="0"><animate attributeName="width" values="0;0;0;180;180;0;0" keyTimes="0;0.6;0.6;0.66;0.79;0.8;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="role5"><rect x="30" y="88" height="22" width="0"><animate attributeName="width" values="0;0;0;225;225;0" keyTimes="0;0.8;0.8;0.86;0.98;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
  </defs>

  <style>
    @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    .blink { animation: blink 0.75s steps(2) infinite; }
    .float { animation: float 5s ease-in-out infinite; }
    .mono { font-family: 'Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace; }
    .sans { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .pill rect { transition: fill 0.2s, stroke 0.2s; }
    .pill:hover rect { fill: rgba(0,212,255,0.1); stroke: #00D4FF; }
    .pill:hover text { fill: #E6EDF3; }
  </style>

  <!-- Background -->
  <rect width="850" height="280" rx="12" fill="#0D1117" />
  <rect width="850" height="280" rx="12" fill="url(#cyan-glow)" />
  <rect width="850" height="280" rx="12" fill="url(#green-glow)" />
  <rect width="850" height="280" rx="12" fill="none" stroke="url(#border-grad)" stroke-width="1" />

  <!-- Matrix Code Rain Columns (right side) -->
  <g class="mono" font-size="11" fill="#00FF41" opacity="0.12">
    <!-- Col 1 -->
    <text x="560" y="0"><animate attributeName="y" values="-20;300" dur="4.2s" repeatCount="indefinite" />01001</text>
    <text x="600" y="0"><animate attributeName="y" values="-40;300" dur="3.5s" repeatCount="indefinite" />async</text>
    <text x="640" y="0"><animate attributeName="y" values="-60;300" dur="5.1s" repeatCount="indefinite" />const</text>
    <text x="680" y="0"><animate attributeName="y" values="-10;300" dur="3.8s" repeatCount="indefinite" />model</text>
    <text x="720" y="0"><animate attributeName="y" values="-80;300" dur="4.6s" repeatCount="indefinite" />train</text>
    <text x="755" y="0"><animate attributeName="y" values="-30;300" dur="3.2s" repeatCount="indefinite" />flask</text>
    <text x="790" y="0"><animate attributeName="y" values="-50;300" dur="5.5s" repeatCount="indefinite" />torch</text>
    <text x="580" y="0"><animate attributeName="y" values="-100;300" dur="6.0s" repeatCount="indefinite" />react</text>
    <text x="660" y="0"><animate attributeName="y" values="-120;300" dur="4.0s" repeatCount="indefinite" />def()</text>
    <text x="700" y="0"><animate attributeName="y" values="-70;300" dur="5.8s" repeatCount="indefinite" />class</text>
    <text x="740" y="0"><animate attributeName="y" values="-140;300" dur="3.6s" repeatCount="indefinite" />yield</text>
    <text x="820" y="0"><animate attributeName="y" values="-90;300" dur="4.4s" repeatCount="indefinite" />numpy</text>
  </g>

  <!-- Brighter rain accents -->
  <g class="mono" font-size="11" fill="#00FF41" opacity="0.25">
    <text x="570" y="0"><animate attributeName="y" values="-20;300" dur="3.3s" repeatCount="indefinite" />λ</text>
    <text x="620" y="0"><animate attributeName="y" values="-50;300" dur="4.7s" repeatCount="indefinite" />→</text>
    <text x="690" y="0"><animate attributeName="y" values="-35;300" dur="3.9s" repeatCount="indefinite" />∑</text>
    <text x="770" y="0"><animate attributeName="y" values="-65;300" dur="5.2s" repeatCount="indefinite" />⊕</text>
    <text x="810" y="0"><animate attributeName="y" values="-15;300" dur="4.1s" repeatCount="indefinite" />∇</text>
  </g>

  <!-- Left Content Block -->
  <g class="float">
    <!-- Greeting -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze" />
      <text x="30" y="42" class="sans" font-size="24" font-weight="700" fill="#E6EDF3">Hey, I'm </text>
      <text x="156" y="42" class="sans" font-size="24" font-weight="700" fill="#00D4FF">Hemal</text>
      <text x="222" y="42" class="sans" font-size="24" font-weight="700" fill="#E6EDF3"> 👋</text>
    </g>

    <!-- Subtitle -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze" />
      <text x="30" y="65" class="mono" font-size="12" fill="#7D8590">$ whoami</text>
    </g>

    <!-- Typing Role Carousel -->
    <g class="mono" font-size="16" font-weight="600" fill="#00FF41">
      <text x="30" y="105" clip-path="url(#role1)">Software Engineer</text>
      <text x="30" y="105" clip-path="url(#role2)">AI / ML Engineer</text>
      <text x="30" y="105" clip-path="url(#role3)">Data Analyst</text>
      <text x="30" y="105" clip-path="url(#role4)">Cloud Architect</text>
      <text x="30" y="105" clip-path="url(#role5)">Full Stack Developer</text>
      <!-- Blinking cursor -->
      <rect x="30" y="90" width="2" height="18" fill="#00FF41" class="blink" />
    </g>

    <!-- Key-value details -->
    <g class="mono" font-size="11" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze" />
      <text x="30" y="135" fill="#7D8590">Education     <tspan fill="#E6EDF3">B.Tech, Computer Science</tspan></text>
      <text x="30" y="152" fill="#7D8590">Focus         <tspan fill="#00D4FF">AI, ML &amp; Cloud-native Systems</tspan></text>
      <text x="30" y="169" fill="#7D8590">Location      <tspan fill="#E6EDF3">India / Remote</tspan></text>
      <text x="30" y="186" fill="#7D8590">Email         <tspan fill="#E6EDF3">shingloo55@gmail.com</tspan></text>
    </g>
  </g>

  <!-- Skills Pills -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.5s" fill="freeze" />

    <!-- Row 1 -->
    <g class="pill"><rect x="30" y="204" width="58" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="59" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Python</text></g>
    <g class="pill"><rect x="94" y="204" width="40" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="114" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">C++</text></g>
    <g class="pill"><rect x="140" y="204" width="52" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="166" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">React</text></g>
    <g class="pill"><rect x="198" y="204" width="60" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="228" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Next.js</text></g>
    <g class="pill"><rect x="264" y="204" width="58" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="293" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Flask</text></g>
    <g class="pill"><rect x="328" y="204" width="82" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="369" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">TensorFlow</text></g>
    <g class="pill"><rect x="416" y="204" width="66" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="449" y="219" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">PyTorch</text></g>

    <!-- Row 2 -->
    <g class="pill"><rect x="30" y="232" width="50" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="55" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">AWS</text></g>
    <g class="pill"><rect x="86" y="232" width="52" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="112" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Azure</text></g>
    <g class="pill"><rect x="144" y="232" width="56" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="172" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Docker</text></g>
    <g class="pill"><rect x="206" y="232" width="82" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="247" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Kubernetes</text></g>
    <g class="pill"><rect x="294" y="232" width="78" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="333" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">PostgreSQL</text></g>
    <g class="pill"><rect x="378" y="232" width="62" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="409" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Node.js</text></g>
    <g class="pill"><rect x="446" y="232" width="40" height="22" rx="11" fill="#161B22" stroke="#30363D" stroke-width="0.8" /><text x="466" y="247" class="mono" font-size="10" fill="#7D8590" text-anchor="middle">Git</text></g>
  </g>

  <!-- Right side: Matrix terminal block -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze" />
    <!-- Terminal window -->
    <rect x="520" y="30" width="300" height="220" rx="8" fill="#0D1117" stroke="#00FF41" stroke-opacity="0.15" stroke-width="1" />
    <!-- Terminal header -->
    <rect x="520" y="30" width="300" height="24" rx="8" fill="#161B22" />
    <circle cx="536" cy="42" r="4.5" fill="#FF5F56" />
    <circle cx="550" cy="42" r="4.5" fill="#FFBD2E" />
    <circle cx="564" cy="42" r="4.5" fill="#27C93F" />
    <text x="670" y="46" text-anchor="middle" class="mono" font-size="10" fill="#7D8590">hemal@dev:~</text>

    <!-- Terminal code lines -->
    <g class="mono" font-size="10.5">
      <text x="532" y="72" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze" /><tspan fill="#BD93F9">import</tspan> tensorflow <tspan fill="#BD93F9">as</tspan> tf</text>
      <text x="532" y="88" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze" /><tspan fill="#BD93F9">import</tspan> torch</text>
      <text x="532" y="104" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze" /><tspan fill="#BD93F9">from</tspan> flask <tspan fill="#BD93F9">import</tspan> Flask</text>
      <text x="532" y="120" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze" /></text>
      <text x="532" y="136" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze" /><tspan fill="#FF79C6">class</tspan> <tspan fill="#50FA7B">SoftwareEngineer</tspan>:</text>
      <text x="532" y="152" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze" />  name  = <tspan fill="#F1FA8C">"Hemal Shingloo"</tspan></text>
      <text x="532" y="168" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze" />  role  = <tspan fill="#F1FA8C">"AI Engineer"</tspan></text>
      <text x="532" y="184" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze" />  stack = <tspan fill="#8BE9FD">[</tspan><tspan fill="#F1FA8C">"Python"</tspan>,</text>
      <text x="532" y="200" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze" />          <tspan fill="#F1FA8C">"TF"</tspan>, <tspan fill="#F1FA8C">"React"</tspan><tspan fill="#8BE9FD">]</tspan></text>
      <text x="532" y="220" fill="#7D8590" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze" />  <tspan fill="#FF79C6">def</tspan> <tspan fill="#50FA7B">build</tspan>(self): ...</text>

      <!-- Blinking cursor at end -->
      <rect x="532" y="230" width="7" height="12" fill="#00FF41" opacity="0" class="blink">
        <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze" />
      </rect>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="510" cy="60" r="1" fill="#00FF41" opacity="0.3"><animate attributeName="cy" values="60;20;60" dur="7s" repeatCount="indefinite" /></circle>
  <circle cx="540" cy="260" r="1.2" fill="#00D4FF" opacity="0.25"><animate attributeName="cy" values="260;200;260" dur="9s" repeatCount="indefinite" /></circle>
  <circle cx="830" cy="100" r="1" fill="#00FF41" opacity="0.2"><animate attributeName="cy" values="100;50;100" dur="6s" repeatCount="indefinite" /></circle>
</svg>
